<!DOCTYPE html>
<html>
<head>
    <title>Radio Button Example</title>
</head>

<body>

<p>24BKT0164</p>
<p>MD RAKHSHAN SAIF</p>

<h2>Select a Color</h2>

<input type="radio" name="color" value="Red"> Red<br>
<input type="radio" name="color" value="Green"> Green<br>
<input type="radio" name="color" value="Blue"> Blue<br><br>

<button onclick="showColor()">Show Selected</button>

<p id="output"></p>

<script>
    function showColor() {
        var colors = document.getElementsByName("color");
        var selected = "";

        for (var i = 0; i < colors.length; i++) {
            if (colors[i].checked) {
                selected = colors[i].value;
            }
        }

        document.getElementById("output").innerHTML = "Selected Color: " + selected;
    }
</script>

</body>
</html>
