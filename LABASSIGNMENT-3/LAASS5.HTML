<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>

<body>

<p>24BKT0164</p>
<p>MD RAKHSHAN SAIF</p>

<h2>Calculator</h2>

<form>
    Number 1: <input type="number" step="any" name="num1"><br><br>
    Number 2: <input type="number" step="any" name="num2"><br><br>

    <button type="button" onclick="calculate(this.form, 'add')">Add</button>
    <button type="button" onclick="calculate(this.form, 'sub')">Subtract</button>
    <button type="button" onclick="calculate(this.form, 'mul')">Multiply</button>
    <button type="button" onclick="calculate(this.form, 'div')">Divide</button>
</form>

<p id="result"></p>

<script>
    function calculate(form, operation) {
        var num1 = parseFloat(form.elements["num1"].value);
        var num2 = parseFloat(form.elements["num2"].value);
        var result;

        switch(operation) {
            case 'add':
                result = num1 + num2;
                break;

            case 'sub':
                result = num1 - num2;
                break;

            case 'mul':
                result = num1 * num2;
                break;

            case 'div':
                if (num2 == 0) {
                    result = "Cannot divide by zero";
                } else {
                    result = num1 / num2;
                }
                break;

            default:
                result = "Invalid operation";
        }

        document.getElementById("result").innerHTML = "Result: " + result;
    }
</script>

</body>
</html>
