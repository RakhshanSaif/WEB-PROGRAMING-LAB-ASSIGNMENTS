<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>

<body>

<p>24BKT0164</p>
<p>MD RAKHSHAN SAIF</p>

<h2>Multiplication Table</h2>

Enter Number: <input type="text" id="num"><br><br>

<button onclick="printTable()">Show Table</button>

<p id="output"></p>

<script>
    function printTable() {
        var n = parseInt(document.getElementById("num").value);
        var i = 1;
        var result = "";

        do {
            result = result + n + " x " + i + " = " + (n * i) + "<br>";
            i++;
        } while (i <= 10);

        document.getElementById("output").innerHTML = result;
    }
</script>

</body>
</html>
