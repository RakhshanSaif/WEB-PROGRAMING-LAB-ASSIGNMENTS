<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f2f2f2;
    }

    .container {
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      text-align: center;
      background-color: white;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function GradeCalculator() {
  const [m1, setM1] = React.useState("");
  const [m2, setM2] = React.useState("");
  const [m3, setM3] = React.useState("");
  const [result, setResult] = React.useState("");

  const calculateGrade = () => {
    const avg = (Number(m1) + Number(m2) + Number(m3)) / 3;

    let grade = "";

    if (avg >= 90) {
      grade = "A";
    } else if (avg >= 75) {
      grade = "B";
    } else if (avg >= 50) {
      grade = "C";
    } else {
      grade = "Fail";
    }

    setResult(`Average: ${avg.toFixed(2)} | Grade: ${grade}`);
  };

  return (
    <div className="container">
      <h1>Grade Calculator</h1>

      <input type="number" value={m1} onChange={(e) => setM1(e.target.value)} placeholder="Subject 1" />
      <input type="number" value={m2} onChange={(e) => setM2(e.target.value)} placeholder="Subject 2" />
      <input type="number" value={m3} onChange={(e) => setM3(e.target.value)} placeholder="Subject 3" />

      <button onClick={calculateGrade}>Calculate</button>

      <h2>{result}</h2>

      <p>24BKT0164</p>
      <p>MD RAKHSHAN SAIF</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GradeCalculator />);

</script>

</body>
</html>
