<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f2f2f2;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .preview img {
      width: 400px;
      height: 250px;
      border-radius: 10px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .preview img:hover {
      transform: scale(1.05);
    }

    .thumbnails {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .thumbnails img {
      width: 80px;
      height: 50px;
      cursor: pointer;
      border-radius: 5px;
      transition: transform 0.3s;
    }

    .thumbnails img:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function Gallery() {
  const images = [
    "https://picsum.photos/id/1015/400/250",
    "https://picsum.photos/id/1016/400/250",
    "https://picsum.photos/id/1018/400/250",
    "https://picsum.photos/id/1020/400/250",
    "https://picsum.photos/id/1024/400/250"
  ];

  const [selected, setSelected] = React.useState(images[0]);

  return (
    <div className="container">
      <h1>Image Gallery</h1>

      <div className="preview">
        <img src={selected} />
      </div>

      <div className="thumbnails">
        {images.map((img, index) => (
          <img
            key={index}
            src={img}
            onClick={() => setSelected(img)}
          />
        ))}
      </div>

      <p>24BKT0164</p>
      <p>MD RAKHSHAN SAIF</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Gallery />);

</script>

</body>
</html>
